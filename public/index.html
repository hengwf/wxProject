<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>医考通 - 题库管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%); padding: 20px; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
    .header { background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%); padding: 30px; color: white; }
    .header h1 { font-size: 28px; margin-bottom: 10px; }
    .header p { opacity: 0.9; font-size: 14px; }
    .content { padding: 30px; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%); padding: 20px; border-radius: 12px; color: white; text-align: center; }
    .stat-card .value { font-size: 36px; font-weight: bold; }
    .stat-card .label { font-size: 14px; opacity: 0.9; margin-top: 5px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab { padding: 12px 24px; border: none; background: #f0f0f0; border-radius: 8px; cursor: pointer; font-size: 15px; transition: all 0.3s; }
    .tab.active { background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%); color: white; }
    .category-selector { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .category-btn { padding: 10px 20px; border: 2px solid #1890ff; background: white; color: #1890ff; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
    .category-btn:hover, .category-btn.active { background: #1890ff; color: white; }
    .chapter-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; max-height: 120px; overflow-y: auto; padding: 10px; background: #f9f9f9; border-radius: 8px; }
    .chapter-tab { padding: 8px 16px; border: 2px solid #ddd; background: white; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.3s; }
    .chapter-tab:hover, .chapter-tab.active { border-color: #1890ff; background: #1890ff; color: white; }
    .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 500; transition: all 0.3s; }
    .btn-primary { background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(24, 144, 255, 0.4); }
    .btn-add { margin-bottom: 20px; }
    .table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    .table th, .table td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
    .table th { background: #f5f5f5; font-weight: 600; color: #333; }
    .table tr:hover { background: #f9f9f9; }
    .btn-edit { background: #ffc107; color: #333; padding: 6px 12px; font-size: 13px; margin-right: 5px; }
    .btn-delete { background: #f44336; color: white; padding: 6px 12px; font-size: 13px; }
    .extra-badge { display: inline-block; padding: 2px 8px; background: #4CAF50; color: white; font-size: 12px; border-radius: 4px; margin-left: 8px; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
    .modal.show { display: flex; }
    .modal-content { background: white; padding: 30px; border-radius: 16px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
    .modal-content h3 { margin-bottom: 20px; color: #333; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #555; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 14px; transition: all 0.3s; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #1890ff; }
    .form-group textarea { min-height: 100px; resize: vertical; }
    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .difficulty-selector { display: flex; gap: 10px; margin-bottom: 20px; }
    .difficulty-btn { padding: 10px 20px; border: 2px solid #ddd; background: white; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
    .difficulty-btn:hover, .difficulty-btn.active { border-color: #1890ff; background: #1890ff; color: white; }
    .difficulty-btn.easy { border-color: #4CAF50; }
    .difficulty-btn.easy:hover, .difficulty-btn.easy.active { background: #4CAF50; }
    .difficulty-btn.medium { border-color: #ff9800; }
    .difficulty-btn.medium:hover, .difficulty-btn.medium.active { background: #ff9800; }
    .difficulty-btn.hard { border-color: #f44336; }
    .difficulty-btn.hard:hover, .difficulty-btn.hard.active { background: #f44336; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 30px; }
    .btn-cancel { background: #f0f0f0; color: #333; }
    .btn-save { background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%); color: white; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏥 医考通题库管理后台</h1>
      <p>🛡️ 安全模式：新增题目不会破坏原始题库！</p>
    </div>
    
    <div class="content">
      <div class="stats">
        <div class="stat-card">
          <div class="value" id="totalQuestions">0</div>
          <div class="label">题目总数</div>
        </div>
        <div class="stat-card">
          <div class="value" id="totalChapters">0</div>
          <div class="label">章节总数</div>
        </div>
        <div class="stat-card">
          <div class="value" id="totalCategories">0</div>
          <div class="label">分类数量</div>
        </div>
      </div>
      
      <div class="tabs">
        <button class="tab active" onclick="showTab('questions')">题库管理</button>
        <button class="tab" onclick="showTab('stats')">数据统计</button>
      </div>
      
      <div id="questionsTab" class="content" style="padding:0;">
        <div class="category-selector">
          <button class="category-btn active" data-category="pharmacist" onclick="selectCategory('pharmacist')">💊 执业药师</button>
          <button class="category-btn" data-category="nurse" onclick="selectCategory('nurse')">👩‍⚕️ 护士执业</button>
          <button class="category-btn" data-category="doctor" onclick="selectCategory('doctor')">👨‍⚕️ 执业医师</button>
        </div>
        
        <div class="chapter-tabs" id="chapterTabs"></div>
        
        <button class="btn btn-primary btn-add" onclick="openAddModal()">+ 添加题目</button>
        
        <table class="table" id="questionsTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>题目</th>
              <th>答案</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      
      <div id="statsTab" class="content" style="display: none; padding:0;">
        <h3>题库统计</h3>
        <div id="statsContent"></div>
      </div>
    </div>
  </div>
  
  <div class="modal" id="modal">
    <div class="modal-content">
      <h3 id="modalTitle">添加题目</h3>
      <form id="questionForm">
        <div class="form-group" id="difficultySelector">
          <label>难度选择</label>
          <div class="difficulty-selector">
            <button type="button" class="difficulty-btn easy" data-difficulty="easy" onclick="selectDifficulty('easy')">简单 (1-3章)</button>
            <button type="button" class="difficulty-btn medium" data-difficulty="medium" onclick="selectDifficulty('medium')">中等 (4-7章)</button>
            <button type="button" class="difficulty-btn hard" data-difficulty="hard" onclick="selectDifficulty('hard')">困难 (8-10章)</button>
          </div>
        </div>
        <div class="form-group">
          <label>题目内容</label>
          <textarea id="question" required></textarea>
        </div>
        <div class="form-group">
          <label>选项</label>
          <div class="options">
            <input type="text" id="optionA" placeholder="选项A" required>
            <input type="text" id="optionB" placeholder="选项B" required>
            <input type="text" id="optionC" placeholder="选项C" required>
            <input type="text" id="optionD" placeholder="选项D" required>
          </div>
        </div>
        <div class="form-group">
          <label>正确答案</label>
          <select id="answer" required>
            <option value="0">A</option>
            <option value="1">B</option>
            <option value="2">C</option>
            <option value="3">D</option>
          </select>
        </div>
        <div class="form-group">
          <label>提示</label>
          <input type="text" id="hint" placeholder="可选：答题提示">
        </div>
        <div class="form-group">
          <label>解析</label>
          <textarea id="explanation" placeholder="可选：答案解析"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-cancel" onclick="closeModal()">取消</button>
          <button type="submit" class="btn btn-save">保存</button>
        </div>
      </form>
    </div>
  </div>
  
  <script>
    let currentCategory = 'pharmacist';
    let currentChapter = 1;
    let currentDifficulty = 'easy';
    let currentQuestions = [];
    let extraQuestions = [];
    
    const categoryNames = {
      pharmacist: '💊 执业药师',
      nurse: '👩‍⚕️ 护士执业',
      doctor: '👨‍⚕️ 执业医师',
      life: '生活常识',
      entertainment: '影视娱乐',
      history: '历史人文',
      general: '综合知识'
    };
    
    async function loadStats() {
      const res = await fetch('/api/stats');
      const data = await res.json();
      
      document.getElementById('totalQuestions').textContent = data.total;
      document.getElementById('totalCategories').textContent = Object.keys(data).length - 1;
      
      let totalChapters = 0;
      for (const category in data) {
        if (category !== 'total') {
          totalChapters += data[category].chapters || data[category].levels;
        }
      }
      document.getElementById('totalChapters').textContent = totalChapters;
    }
    
    async function loadQuestions() {
      const res = await fetch(`/api/questions/${currentCategory}`);
      const data = await res.json();
      currentQuestions = data;
      
      const chapterTabs = document.getElementById('chapterTabs');
      chapterTabs.innerHTML = '';
      
      data.forEach(chapter => {
        const chapterId = chapter.chapter || chapter.level;
        const btn = document.createElement('button');
        btn.className = `chapter-tab ${chapterId === currentChapter ? 'active' : ''}`;
        btn.textContent = `第${chapterId}章`;
        btn.onclick = () => selectChapter(chapterId);
        chapterTabs.appendChild(btn);
      });
      
      renderQuestions(data);
    }
    
    function selectCategory(category) {
      currentCategory = category;
      currentChapter = 1;
      
      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
      
      loadQuestions();
    }
    
    function selectChapter(chapter) {
      currentChapter = chapter;
      
      document.querySelectorAll('.chapter-tab').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
      
      renderQuestions(currentQuestions);
    }
    
    function renderQuestions(data) {
      const tbody = document.querySelector('#questionsTable tbody');
      tbody.innerHTML = '';
      
      const chapterData = data.find(l => l.chapter === currentChapter || l.level === currentChapter);
      if (!chapterData || !chapterData.questions) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">暂无题目</td></tr>';
        return;
      }
      
      chapterData.questions.forEach(q => {
        const row = document.createElement('tr');
        const isExtra = q.id >= 10000;
        row.innerHTML = `
          <td>${q.id} ${isExtra ? '<span class="extra-badge">新增</span>' : ''}</td>
          <td style="max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${q.question}</td>
          <td>${['A', 'B', 'C', 'D'][q.answer]}</td>
          <td>
            ${isExtra ? `<button class="btn btn-delete" onclick="deleteQuestion(${q.id})">删除</button>` : '<span style="color:#999;font-size:12px">原始题目</span>'}
          </td>
        `;
        tbody.appendChild(row);
      });
    }
    
    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      
      document.getElementById('questionsTab').style.display = tab === 'questions' ? 'block' : 'none';
      document.getElementById('statsTab').style.display = tab === 'stats' ? 'block' : 'none';
      
      if (tab === 'stats') {
        loadStatsDetail();
      }
    }
    
    async function loadStatsDetail() {
      const res = await fetch('/api/stats');
      const data = await res.json();
      
      const content = document.getElementById('statsContent');
      let html = '<table class="table"><thead><tr><th>分类</th><th>章节数</th><th>题目总数</th><th>新增题目</th></tr></thead><tbody>';
      
      for (const category in data) {
        if (category !== 'total') {
          const chapters = data[category].chapters || data[category].levels;
          html += `<tr><td>${categoryNames[category] || category}</td><td>${chapters}</td><td>${data[category].questions}</td><td>${data[category].extra || 0}</td></tr>`;
        }
      }
      
      html += `</tbody></table><p style="margin-top: 20px; color: #666;">总计：${data.total}道题目</p>`;
      content.innerHTML = html;
    }
    
    function selectDifficulty(difficulty) {
      currentDifficulty = difficulty;
      
      document.querySelectorAll('.difficulty-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
    }
    
    function openAddModal() {
      currentDifficulty = 'easy';
      document.getElementById('modalTitle').textContent = '添加题目';
      document.getElementById('question').value = '';
      document.getElementById('optionA').value = '';
      document.getElementById('optionB').value = '';
      document.getElementById('optionC').value = '';
      document.getElementById('optionD').value = '';
      document.getElementById('answer').value = '0';
      document.getElementById('hint').value = '';
      document.getElementById('explanation').value = '';
      
      document.getElementById('difficultySelector').style.display = 'block';
      
      document.querySelectorAll('.difficulty-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelector('.difficulty-btn.easy').classList.add('active');
      
      document.getElementById('modal').classList.add('show');
    }
    
    function closeModal() {
      document.getElementById('modal').classList.remove('show');
    }
    
    async function deleteQuestion(id) {
      if (!confirm('确定要删除这道题目吗？')) return;
      
      const res = await fetch(`/api/questions/${currentCategory}/${id}`, {
        method: 'DELETE'
      });
      const data = await res.json();
      
      if (data.success) {
        alert('删除成功');
        loadQuestions();
        loadStats();
      } else {
        alert('删除失败');
      }
    }
    
    document.getElementById('questionForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const questionData = {
        question: document.getElementById('question').value,
        options: [
          document.getElementById('optionA').value,
          document.getElementById('optionB').value,
          document.getElementById('optionC').value,
          document.getElementById('optionD').value
        ],
        answer: parseInt(document.getElementById('answer').value),
        hint: document.getElementById('hint').value || '',
        explanation: document.getElementById('explanation').value || ''
      };
      
      const res = await fetch('/api/questions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          category: currentCategory,
          difficulty: currentDifficulty,
          questionData
        })
      });
      
      const data = await res.json();
      
      if (data.success) {
        alert(data.message);
        closeModal();
        loadQuestions();
        loadStats();
      } else {
        alert('保存失败：' + data.message);
      }
    });
    
    loadStats();
    loadQuestions();
  </script>
</body>
</html>
